      kind: Method
      line_range: [46, 55]
    notes: "vague intent — EvictAll is the only sample that 'clears state'"

  # ---- Error-message search (string copied from a log / stack trace) ----
  - id: q20
    intent: 'server: not listening'
    expected:
      file: server.go
      symbol: Server.Close
      kind: Method
      line_range: [32, 37]
    notes: "error-message search — exact string lives only in Close()"

  - id: q21
    intent: "insufficient balance"
    expected:
      file: token.sol
      symbol: Token.transfer
      kind: Method
      line_range: [35, 46]
    notes: "error-message search — require() string lives in transfer()"

  - id: q22
    intent: "amount must be positive"
    expected:
      file: token.sol
      symbol: Token.onlyPositive
      kind: Modifier
      line_range: [19, 22]
