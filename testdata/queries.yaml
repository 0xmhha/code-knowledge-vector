  - id: q23
    intent: "404 not found"
    expected:
      file: handler.ts
      symbol: Handler.dispatch
      kind: Method
      line_range: [24, 30]
    notes: "error-message search — 'not found' appears in dispatch and notFound; dispatch is canonical site"

  # ---- Short keyword (1-3 tokens) ----
  - id: q24
    intent: "ERC20 transfer"
    expected:
      file: token.sol
      symbol: Token.transfer
      kind: Method
      line_range: [35, 46]
    notes: "short keyword — domain + verb"

  - id: q25
    intent: "RWMutex"
    expected:
      file: cache.go
      symbol: Cache
      kind: Struct
      line_range: [7, 15]
    notes: "short keyword — Go primitive name; sync.RWMutex only used in Cache"

  - id: q26
    intent: "delete cache entry"
    expected:
      file: cache.go
      symbol: Cache.Delete
      kind: Method
      line_range: [32, 37]
    notes: "short keyword — added with N=34 expansion"

  # ---- Cross-file relationship (target's docstring references other file) ----
  - id: q27
    intent: "where cache eviction is triggered on shutdown"
    expected:
      file: cache.go
      symbol: Cache.EvictAll
      kind: Method
      line_range: [46, 55]
    notes: "cross-file — EvictAll docstring mentions Server.Close; tests whether retrieval picks the eviction site, not the Close site"

  - id: q28
    intent: "default response body for missing routes"
    expected:
      file: handler.ts
      symbol: notFound
      kind: Function
      line_range: [35, 35]
    notes: "vague intent → exported constant; uses Function as the closest SymbolKind"

  # ---- New TS coverage (added with N=34 expansion) ----
  - id: q29
    intent: "500 internal server error response"
    expected:
