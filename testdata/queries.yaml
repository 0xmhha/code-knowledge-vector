# CKV eval fixture — schema v1
#
# Each query expresses a natural-language intent and the ground-truth
# code location that should appear in `ckv query` top-K. Used by
# `ckv eval` to compute recall@k, MRR, and citation accuracy.
#
# A "hit" is correct if its citation.file equals expected.file AND
# the citation's line range overlaps expected.line_range (the chunker
# may emit either a tight symbol chunk or a file_header — either
# bracketing the expected lines counts).
#
# corpus: ./testdata/sample (server.go + cache.go + handler.ts + token.sol).
#
# Note these intents are deliberately varied across query *types* so the
# fixture exercises retrieval beyond the original q1..q10 set:
#
#   - paraphrased intent     (different surface form, same target)
#   - exact-symbol lookup    (the user pastes the qualified name)
#   - vague intent           (one-liner with little technical wording)
#   - error-message search   (string copied from a stack trace / log)
#   - short keyword          (1-3 tokens, no sentence)
#   - cross-file relationship (target's docstring mentions another file)
#
# Per-language balance (post-expansion, N=50):
#   Go (server.go=8 + cache.go=10 + validator.go=4) = 22 queries
#   TypeScript (handler.ts)         =  7 queries
#   JavaScript (client.js)          =  4 queries
#   Solidity   (token.sol)          = 11 queries
#   Markdown   (docs/decisions.md)  =  4 queries
#   + 2 cross-file queries (cache↔server)
#
# Adding more queries — checklist:
#   1. Pick a real symbol (run `ckv build` and confirm the chunk exists).
#   2. Set line_range to the symbol's body OR a superset (a file_header
#      chunk that covers it also counts as a hit — see scorer overlap).
#   3. Keep intent in *English* so the bge embedder family can compare
#      with the embedded code text. Korean intents are valid only when
#      the embedder is multilingual.
#   4. If you append to testdata/sample, do so AT END OF FILE so existing
#      q1..q10 line_ranges stay valid.
schema_version: "1"

