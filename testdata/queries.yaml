# CKV eval fixture — schema v1
#
# Each query expresses a natural-language intent and the ground-truth
# code location that should appear in `ckv query` top-K. Used by
# `ckv eval` to compute recall@k, MRR, and citation accuracy.
#
# A "hit" is correct if its citation.file equals expected.file AND
# the citation's line range overlaps expected.line_range (the chunker
# may emit either a tight symbol chunk or a file_header — either
# bracketing the expected lines counts).
#
# corpus: ./testdata/sample (server.go + cache.go + handler.ts + token.sol).
#
# Note these intents are deliberately varied across query *types* so the
# fixture exercises retrieval beyond the original q1..q10 set:
#
#   - paraphrased intent     (different surface form, same target)
#   - exact-symbol lookup    (the user pastes the qualified name)
#   - vague intent           (one-liner with little technical wording)
#   - error-message search   (string copied from a stack trace / log)
#   - short keyword          (1-3 tokens, no sentence)
#   - cross-file relationship (target's docstring mentions another file)
#
# Per-language balance (post-expansion, N=34):
#   Go (server.go=7 + cache.go=10)  = 17 queries
#   TypeScript (handler.ts)         =  7 queries
#   Solidity   (token.sol)          = 10 queries
#
# Adding more queries — checklist:
#   1. Pick a real symbol (run `ckv build` and confirm the chunk exists).
#   2. Set line_range to the symbol's body OR a superset (a file_header
#      chunk that covers it also counts as a hit — see scorer overlap).
#   3. Keep intent in *English* so the bge embedder family can compare
#      with the embedded code text. Korean intents are valid only when
#      the embedder is multilingual.
#   4. If you append to testdata/sample, do so AT END OF FILE so existing
#      q1..q10 line_ranges stay valid.
schema_version: "1"

queries:
  - id: q1
    intent: "TCP socket bind on port"
    expected:
      file: server.go
      symbol: Server.Listen
      kind: Method
      line_range: [22, 29]
    notes: "primary acceptance #2 fixture"

  - id: q2
    intent: "shutdown listener and release the socket"
    expected:
      file: server.go
      symbol: Server.Close
      kind: Method
      line_range: [32, 37]

  - id: q3
    intent: "thread-safe in-memory key value cache"
    expected:
      file: cache.go
      # Either the Cache struct or NewCache constructor counts —
      # both occupy the top of cache.go.
      symbol: Cache
      kind: Struct
      line_range: [7, 15]

  - id: q4
    intent: "store value under a key in the cache"
    expected:
      file: cache.go
      symbol: Cache.Set
      kind: Method
      line_range: [18, 22]

  - id: q5
    intent: "retrieve value by key; report whether it was found"
    expected:
      file: cache.go
      symbol: Cache.Get
      kind: Method
      line_range: [25, 30]

  # ---- TS coverage (added W3-T9) ----
  - id: q6
    intent: "route request path to a registered handler"
    expected:
      file: handler.ts
      symbol: Handler.dispatch
      kind: Method
      line_range: [24, 30]

  - id: q7
    intent: "bind a callback to a URL path"
    expected:
      file: handler.ts
      symbol: Handler.register
      kind: Method
      line_range: [19, 21]

  # ---- Solidity coverage (added W3-T10) ----
  - id: q8
    intent: "ERC20 token transfer with balance check"
    expected:
      file: token.sol
      symbol: Token.transfer
      kind: Method
      line_range: [35, 46]

  - id: q9
    intent: "require non-zero amount before continuing"
    expected:
      file: token.sol
      symbol: Token.onlyPositive
      kind: Modifier
      line_range: [19, 22]

  - id: q10
    intent: "Transfer event log"
    expected:
      file: token.sol
      symbol: Token.Transfer
      kind: Event
      line_range: [13, 13]

  # ---- N=10→N=34 expansion (FU-7 / Roadmap §12 #1) ----
  # The blocks below cover new query *types* so retrieval improvements
  # in Phase B/C/D have measurement headroom on recall@1 + MRR.

  # ---- Exact-symbol lookups (user pastes a fully-qualified name) ----
  - id: q11
    intent: "Server.Listen"
    expected:
      file: server.go
      symbol: Server.Listen
      kind: Method
      line_range: [22, 29]
    notes: "exact-symbol — keyword-only query; tests symbol embedding"

  - id: q12
    intent: "Cache.Get"
    expected:
      file: cache.go
      symbol: Cache.Get
      kind: Method
      line_range: [25, 30]
    notes: "exact-symbol Go"

  - id: q13
    intent: "Handler.dispatch"
    expected:
      file: handler.ts
      symbol: Handler.dispatch
      kind: Method
      line_range: [24, 30]
    notes: "exact-symbol TS"

  - id: q14
    intent: "Token.transfer"
    expected:
      file: token.sol
      symbol: Token.transfer
      kind: Method
      line_range: [35, 46]
    notes: "exact-symbol Solidity"

  # ---- Paraphrased intents (same target as q1..q10, different wording) ----
  - id: q15
    intent: "open a network listener on the configured address"
    expected:
      file: server.go
      symbol: Server.Listen
      kind: Method
      line_range: [22, 29]
    notes: "paraphrase of q1 — different verbs/nouns, same target"

  - id: q16
    intent: "look up an existing entry by its key"
    expected:
      file: cache.go
      symbol: Cache.Get
      kind: Method
      line_range: [25, 30]
    notes: "paraphrase of q5 — softer wording"

  - id: q17
    intent: "send tokens between two accounts"
    expected:
      file: token.sol
      symbol: Token.transfer
      kind: Method
      line_range: [35, 46]
    notes: "paraphrase of q8 — domain-language form"

  # ---- Vague intent (short, light technical content) ----
  - id: q18
    intent: "code that initializes networking"
    expected:
      file: server.go
      symbol: Server.Listen
      kind: Method
      line_range: [22, 29]
    notes: "vague intent — challenges semantic retrieval; either Listen or NewServer counts but only Listen is in line_range"

  - id: q19
    intent: "where state gets cleared"
    expected:
      file: cache.go
