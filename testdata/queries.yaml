      symbol: Token.constructor
      kind: Method
      line_range: [25, 28]
    notes: "Solidity constructor — Token.constructor span; contract body span (12,47) also overlaps"

  # ---- Symbol-level Go additions ----
  - id: q33
    intent: "report whether the server has an open listener"
    expected:
