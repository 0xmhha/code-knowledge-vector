name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build (default, mock embedder)
        run: go build ./...

      - name: Test
        shell: bash
        run: |
          # The coreml backend (internal/embed/coreml) links libtokenizers
          # (HuggingFace Rust), which the CI runner doesn't have. It is now
          # opt-in behind `-tags tokenizers`: without the tag the package
          # compiles its no-dep stub, so a plain `go test ./...` is clean on
          # every platform. R1' uses Ollama as the production embedder
          # (pkg/embed/ollama); the real coreml path is dev/local only.
          go test ./... -count=1 -timeout 5m

      - name: Vet
        run: go vet ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  eval-gate:
    name: eval regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build index + eval (mock embedder)
        run: |
          TMP_OUT=$(mktemp -d)
          go run ./cmd/ckv build --embedder=mock --src ./testdata/sample --out "$TMP_OUT"
          go run ./cmd/ckv eval --embedder=mock --fixture ./testdata/queries.yaml \
            --out "$TMP_OUT" --src ./testdata/sample \
            --min-recall5 0.5 --json
          rm -rf "$TMP_OUT"
